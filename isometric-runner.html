<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>荧孢战场</title>
  <style>
    :root {
      --ink: #130b08;
      --cream: #fff1b8;
      --amber: #ffb743;
      --ember: #f13a22;
      --spore: #95ff2f;
      --teal: #0e8ca0;
      --panel: rgba(55, 20, 11, 0.58);
      --panel-strong: rgba(24, 9, 8, 0.82);
      --line: rgba(255, 234, 166, 0.28);
      --line-bright: rgba(149, 255, 47, 0.54);
      --shadow: rgba(0, 0, 0, 0.36);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #110a0b;
      color: var(--cream);
      font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
      user-select: none;
    }

    body {
      position: fixed;
      inset: 0;
      touch-action: none;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      z-index: 2;
      background:
        linear-gradient(rgba(255, 241, 184, 0.035) 1px, transparent 1px),
        radial-gradient(circle at 82% 18%, rgba(149, 255, 47, 0.08), transparent 28%),
        radial-gradient(circle at 12% 82%, rgba(14, 140, 160, 0.11), transparent 26%);
      background-size: 100% 4px, auto, auto;
      mix-blend-mode: screen;
      opacity: 0.48;
    }

    body::after {
      z-index: 6;
      border: 1px solid rgba(255, 241, 184, 0.16);
      box-shadow: inset 0 0 0 1px rgba(149, 255, 47, 0.06);
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #110a0b;
      cursor: crosshair;
    }

    .hud {
      position: fixed;
      z-index: 5;
      inset: calc(12px + env(safe-area-inset-top)) 12px auto 12px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(255, 241, 184, 0.1), transparent 34%),
        linear-gradient(180deg, rgba(92, 35, 19, 0.78), rgba(24, 9, 8, 0.7));
      box-shadow: 0 18px 42px var(--shadow), inset 0 1px 0 rgba(255, 241, 184, 0.2);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .identity {
      min-width: 170px;
      padding: 11px 12px 10px;
    }

    .identity h1 {
      margin: 0;
      color: #fff4c9;
      font-size: 19px;
      line-height: 1.05;
      font-weight: 900;
      text-shadow: 0 2px 12px rgba(149, 255, 47, 0.28);
    }

    .health {
      width: 148px;
      height: 11px;
      margin-top: 9px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(18, 8, 7, 0.68);
      border: 1px solid rgba(255, 241, 184, 0.2);
    }

    .health-fill {
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #95ff2f, #ffe35c, #f13a22);
      box-shadow: 0 0 14px rgba(149, 255, 47, 0.7);
      transform-origin: left center;
      transition: transform 0.16s ease-out;
    }

    .meters {
      display: grid;
      grid-template-columns: repeat(3, 80px);
      overflow: hidden;
    }

    .stat {
      min-height: 58px;
      padding: 9px 10px 8px;
      border-left: 1px solid var(--line);
    }

    .stat:first-child {
      border-left: 0;
    }

    .label {
      display: block;
      color: rgba(255, 241, 184, 0.64);
      font-size: 10px;
      font-weight: 900;
      line-height: 1;
    }

    .value {
      display: block;
      margin-top: 8px;
      color: #fff4c9;
      font-size: 20px;
      line-height: 1;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .touch-pad,
    .touch-actions {
      position: fixed;
      display: none;
      pointer-events: auto;
    }

    .touch-pad {
      left: calc(18px + env(safe-area-inset-left));
      bottom: calc(18px + env(safe-area-inset-bottom));
      width: 132px;
      height: 132px;
    }

    .touch-actions {
      right: calc(18px + env(safe-area-inset-right));
      bottom: calc(22px + env(safe-area-inset-bottom));
      gap: 12px;
      align-items: flex-end;
    }

    .pad-button,
    .action-button {
      border: 1px solid rgba(255, 241, 184, 0.34);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 241, 184, 0.09), transparent),
        rgba(74, 23, 14, 0.58);
      color: rgba(255, 241, 184, 0.86);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 241, 184, 0.16);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease, color 0.16s ease;
    }

    .pad-button {
      position: absolute;
      width: 42px;
      height: 42px;
      font-size: 0;
    }

    .pad-button::before {
      content: "";
      position: absolute;
      inset: 13px;
      border-top: 3px solid currentColor;
      border-left: 3px solid currentColor;
    }

    .pad-button[data-dir="up"] {
      left: 45px;
      top: 0;
    }

    .pad-button[data-dir="up"]::before {
      transform: translateY(4px) rotate(45deg);
    }

    .pad-button[data-dir="left"] {
      left: 0;
      top: 45px;
    }

    .pad-button[data-dir="left"]::before {
      transform: translateX(4px) rotate(-45deg);
    }

    .pad-button[data-dir="right"] {
      right: 0;
      top: 45px;
    }

    .pad-button[data-dir="right"]::before {
      transform: translateX(-4px) rotate(135deg);
    }

    .pad-button[data-dir="down"] {
      left: 45px;
      bottom: 0;
    }

    .pad-button[data-dir="down"]::before {
      transform: translateY(-4px) rotate(225deg);
    }

    .action-button {
      width: 58px;
      height: 58px;
      font-size: 0;
      position: relative;
    }

    .action-button[data-action="fire"]::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      border: 4px solid currentColor;
      box-shadow: 0 0 0 8px rgba(149, 255, 47, 0.12);
    }

    .action-button[data-action="dash"]::before {
      content: "";
      position: absolute;
      left: 15px;
      top: 19px;
      width: 27px;
      height: 16px;
      border-top: 5px solid currentColor;
      border-right: 5px solid currentColor;
      transform: skewX(-18deg);
    }

    .pad-button:active,
    .pad-button.is-held,
    .action-button:active,
    .action-button.is-held {
      background: rgba(149, 255, 47, 0.22);
      border-color: var(--line-bright);
      color: #baff45;
      transform: translateY(1px) scale(0.98);
    }

    body.is-menu .hud,
    body.is-menu .touch-pad,
    body.is-menu .touch-actions,
    body.is-menu .return-home {
      display: none;
    }

    body.is-cleared .return-home {
      display: none;
    }

    .home-screen {
      position: fixed;
      inset: 0;
      z-index: 4;
      display: grid;
      grid-template-columns: minmax(280px, 0.85fr) minmax(320px, 1.15fr);
      grid-template-rows: auto minmax(0, 1fr);
      gap: 18px;
      padding: calc(28px + env(safe-area-inset-top)) 28px calc(28px + env(safe-area-inset-bottom));
      background:
        linear-gradient(115deg, rgba(14, 140, 160, 0.1), transparent 38%),
        radial-gradient(circle at 50% 42%, rgba(255, 183, 67, 0.14), rgba(17, 10, 11, 0.78) 58%, rgba(17, 10, 11, 0.92));
      pointer-events: auto;
    }

    .home-screen.is-hidden {
      display: none;
    }

    .home-titlebar {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 18px;
      padding: 18px;
      border: 1px solid rgba(255, 234, 166, 0.22);
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 18% 0%, rgba(149, 255, 47, 0.18), transparent 32%),
        linear-gradient(135deg, rgba(83, 28, 16, 0.82), rgba(13, 8, 10, 0.72));
      box-shadow: 0 28px 64px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 241, 184, 0.16);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .brand-lockup {
      min-width: 0;
    }

    .brand-lockup h1 {
      margin: 0;
      color: #fff7d5;
      font-size: clamp(34px, 5vw, 62px);
      line-height: 0.96;
      font-weight: 950;
      letter-spacing: 0;
      text-shadow: 0 0 26px rgba(149, 255, 47, 0.22);
    }

    .brand-lockup p {
      margin: 10px 0 0;
      max-width: 42rem;
      color: rgba(255, 241, 184, 0.72);
      font-size: 14px;
      line-height: 1.5;
      font-weight: 750;
    }

    .mission-pills {
      display: grid;
      grid-template-columns: repeat(3, max-content);
      gap: 8px;
      align-items: end;
    }

    .mission-pills span {
      min-width: 78px;
      padding: 9px 11px;
      border: 1px solid rgba(255, 234, 166, 0.2);
      border-radius: var(--radius);
      background: rgba(15, 8, 9, 0.52);
      color: rgba(255, 241, 184, 0.84);
      font-size: 12px;
      line-height: 1;
      font-weight: 900;
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255, 241, 184, 0.12);
    }

    .home-column {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255, 234, 166, 0.24);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(255, 241, 184, 0.07), transparent 35%),
        linear-gradient(180deg, rgba(74, 23, 14, 0.78), rgba(19, 8, 8, 0.76));
      box-shadow: 0 26px 60px rgba(0, 0, 0, 0.34), inset 0 1px 0 rgba(255, 241, 184, 0.16);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .home-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255, 234, 166, 0.16);
    }

    .home-kicker {
      display: block;
      margin-bottom: 8px;
      color: rgba(149, 255, 47, 0.86);
      font-size: 11px;
      line-height: 1;
      font-weight: 900;
    }

    .home-header h2 {
      margin: 0;
      color: #fff4c9;
      font-size: 30px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: 0;
      text-shadow: 0 0 22px rgba(149, 255, 47, 0.2);
    }

    .home-header p {
      margin: 12px 0 0;
      max-width: 34rem;
      color: rgba(255, 241, 184, 0.72);
      font-size: 13px;
      line-height: 1.55;
      font-weight: 700;
    }

    .map-list,
    .talent-list {
      display: grid;
      flex: 1;
      align-content: start;
      gap: 10px;
      padding: 14px;
      overflow-y: auto;
      min-height: 0;
      scrollbar-color: rgba(149, 255, 47, 0.34) rgba(255, 241, 184, 0.08);
    }

    .map-button,
    .talent-button,
    .return-home {
      appearance: none;
      border: 1px solid rgba(255, 234, 166, 0.2);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(255, 241, 184, 0.06), transparent 42%),
        rgba(41, 14, 10, 0.66);
      color: #fff4c9;
      font: inherit;
      text-align: left;
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease;
    }

    .map-button {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      min-height: 82px;
      padding: 10px 12px;
      position: relative;
      overflow: hidden;
    }

    .map-button:hover,
    .talent-button:hover,
    .return-home:hover {
      border-color: rgba(149, 255, 47, 0.62);
      background: rgba(65, 27, 13, 0.78);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.24), inset 0 1px 0 rgba(255, 241, 184, 0.16);
      transform: translateY(-1px);
    }

    .map-button:active,
    .talent-button:active,
    .return-home:active {
      transform: translateY(1px) scale(0.99);
    }

    .map-button:focus-visible,
    .talent-button:focus-visible,
    .return-home:focus-visible,
    .campaign-start:focus-visible,
    .shop-choice:focus-visible,
    .pad-button:focus-visible,
    .action-button:focus-visible {
      outline: 2px solid rgba(149, 255, 47, 0.82);
      outline-offset: 2px;
    }

    .organ-mark {
      width: 52px;
      height: 52px;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 241, 184, 0.24);
      background:
        radial-gradient(circle at 62% 42%, rgba(149, 255, 47, 0.75) 0 5px, transparent 6px),
        radial-gradient(circle at 34% 64%, rgba(255, 241, 184, 0.3), transparent 19px),
        var(--organ-color);
      box-shadow: inset 0 1px 0 rgba(255, 241, 184, 0.2), 0 0 22px rgba(149, 255, 47, 0.08);
    }

    .map-copy strong,
    .talent-copy strong {
      display: block;
      overflow-wrap: anywhere;
      color: #fff4c9;
      font-size: 16px;
      line-height: 1.15;
      font-weight: 900;
    }

    .map-copy span,
    .talent-copy span {
      display: block;
      margin-top: 5px;
      color: rgba(255, 241, 184, 0.66);
      font-size: 12px;
      line-height: 1.35;
      font-weight: 700;
    }

    .map-threat {
      position: absolute;
      left: 82px;
      right: 12px;
      bottom: 10px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 241, 184, 0.1);
      overflow: hidden;
    }

    .map-threat span {
      display: block;
      width: var(--threat);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(149, 255, 47, 0.9), rgba(255, 183, 67, 0.9));
      box-shadow: 0 0 14px rgba(149, 255, 47, 0.34);
    }

    .map-button.is-cleared {
      border-color: rgba(149, 255, 47, 0.42);
      background:
        linear-gradient(135deg, rgba(149, 255, 47, 0.1), transparent 42%),
        rgba(30, 36, 15, 0.58);
    }

    .map-status {
      min-width: 64px;
      color: rgba(149, 255, 47, 0.92);
      font-size: 11px;
      line-height: 1;
      font-weight: 900;
      text-align: right;
    }

    .talent-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255, 234, 166, 0.16);
      color: rgba(255, 241, 184, 0.76);
      font-size: 12px;
      font-weight: 900;
    }

    .talent-points {
      color: #95ff2f;
      font-size: 24px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 18px rgba(149, 255, 47, 0.42);
    }

    .talent-button {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      min-height: 74px;
      padding: 12px 13px;
    }

    .talent-button:disabled {
      cursor: default;
      opacity: 0.58;
    }

    .talent-level {
      display: grid;
      justify-items: end;
      gap: 8px;
      color: #95ff2f;
      font-size: 18px;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
    }

    .talent-meter {
      display: grid;
      grid-auto-flow: column;
      gap: 3px;
    }

    .talent-meter i {
      display: block;
      width: 11px;
      height: 20px;
      border-radius: 3px;
      border: 1px solid rgba(255, 241, 184, 0.18);
      background: rgba(255, 241, 184, 0.08);
    }

    .talent-meter i.is-on {
      border-color: rgba(149, 255, 47, 0.6);
      background: linear-gradient(180deg, #d8ff72, #95ff2f);
      box-shadow: 0 0 12px rgba(149, 255, 47, 0.32);
    }

    .campaign-panel {
      display: grid;
      flex: 1;
      align-content: start;
      gap: 12px;
      min-height: 0;
      padding: 14px;
      overflow-y: auto;
      scrollbar-color: rgba(149, 255, 47, 0.34) rgba(255, 241, 184, 0.08);
    }

    .campaign-card {
      padding: 14px;
      border: 1px solid rgba(255, 234, 166, 0.2);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(149, 255, 47, 0.08), transparent 44%),
        rgba(41, 14, 10, 0.66);
    }

    .campaign-card strong {
      display: block;
      color: #fff4c9;
      font-size: 19px;
      line-height: 1.1;
      font-weight: 950;
    }

    .campaign-card span {
      display: block;
      margin-top: 7px;
      color: rgba(255, 241, 184, 0.68);
      font-size: 12px;
      line-height: 1.45;
      font-weight: 750;
    }

    .chapter-route {
      display: grid;
      gap: 8px;
    }

    .chapter-step {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      min-height: 48px;
      padding: 8px 10px;
      border: 1px solid rgba(255, 234, 166, 0.16);
      border-radius: var(--radius);
      background: rgba(18, 8, 7, 0.42);
      color: rgba(255, 241, 184, 0.7);
      font-size: 12px;
      font-weight: 850;
    }

    .chapter-step b {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 1px solid rgba(255, 241, 184, 0.22);
      color: rgba(255, 241, 184, 0.78);
      font-variant-numeric: tabular-nums;
    }

    .chapter-step.is-current {
      border-color: rgba(149, 255, 47, 0.52);
      background: rgba(44, 55, 18, 0.46);
      color: #fff4c9;
    }

    .chapter-step.is-current b {
      border-color: rgba(149, 255, 47, 0.72);
      color: #95ff2f;
      box-shadow: 0 0 14px rgba(149, 255, 47, 0.2);
    }

    .chapter-type {
      color: rgba(149, 255, 47, 0.9);
      font-size: 11px;
      text-align: right;
      white-space: nowrap;
    }

    .campaign-start {
      appearance: none;
      width: calc(100% - 28px);
      min-height: 52px;
      margin: 0 14px 14px;
      border: 1px solid rgba(149, 255, 47, 0.58);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(216, 255, 114, 0.9), rgba(149, 255, 47, 0.72)),
        rgba(149, 255, 47, 0.78);
      color: #172106;
      font: inherit;
      font-size: 15px;
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.28), 0 0 24px rgba(149, 255, 47, 0.18);
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }

    .campaign-start:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 38px rgba(0, 0, 0, 0.34), 0 0 30px rgba(149, 255, 47, 0.24);
    }

    .campaign-start:active {
      transform: translateY(1px) scale(0.99);
    }

    .shop-overlay {
      position: fixed;
      z-index: 7;
      left: 50%;
      top: calc(96px + env(safe-area-inset-top));
      width: min(760px, calc(100vw - 28px));
      max-height: calc(100vh - 140px - env(safe-area-inset-bottom));
      padding: 14px;
      border: 1px solid rgba(255, 234, 166, 0.26);
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 14% 0%, rgba(149, 255, 47, 0.16), transparent 34%),
        linear-gradient(180deg, rgba(56, 22, 13, 0.94), rgba(15, 7, 8, 0.9));
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.48), inset 0 1px 0 rgba(255, 241, 184, 0.16);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transform: translateX(-50%);
      pointer-events: auto;
      overflow-y: auto;
    }

    .shop-overlay.is-hidden {
      display: none;
    }

    .shop-overlay h2 {
      margin: 0;
      color: #fff4c9;
      font-size: 24px;
      line-height: 1.1;
      font-weight: 950;
    }

    .shop-overlay p {
      margin: 8px 0 0;
      color: rgba(255, 241, 184, 0.72);
      font-size: 13px;
      line-height: 1.45;
      font-weight: 750;
    }

    .shop-choices {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .shop-choice {
      appearance: none;
      min-height: 116px;
      padding: 13px;
      border: 1px solid rgba(255, 234, 166, 0.2);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(255, 241, 184, 0.08), transparent 48%),
        rgba(28, 12, 9, 0.66);
      color: #fff4c9;
      font: inherit;
      text-align: left;
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .shop-choice:hover {
      border-color: rgba(149, 255, 47, 0.6);
      background: rgba(44, 55, 18, 0.5);
      transform: translateY(-1px);
    }

    .shop-choice:active {
      transform: translateY(1px) scale(0.99);
    }

    .shop-choice strong {
      display: block;
      color: #95ff2f;
      font-size: 16px;
      line-height: 1.15;
      font-weight: 950;
    }

    .shop-choice span {
      display: block;
      margin-top: 8px;
      color: rgba(255, 241, 184, 0.72);
      font-size: 12px;
      line-height: 1.42;
      font-weight: 750;
    }

    .return-home {
      position: fixed;
      z-index: 5;
      left: 50%;
      bottom: calc(32px + env(safe-area-inset-bottom));
      display: none;
      align-items: center;
      justify-content: center;
      min-width: 180px;
      min-height: 48px;
      padding: 0 18px;
      text-align: center;
      font-size: 14px;
      font-weight: 900;
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.32), 0 0 28px rgba(149, 255, 47, 0.14);
      transform: translateX(-50%);
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        transition-duration: 0.001ms !important;
      }
    }

    @media (max-width: 760px) {
      body::before {
        opacity: 0.34;
      }

      .hud {
        inset: calc(10px + env(safe-area-inset-top)) 10px auto 10px;
        display: grid;
        justify-content: start;
        gap: 8px;
      }

      .identity {
        min-width: 138px;
        padding: 10px 10px 9px;
      }

      .identity h1 {
        font-size: 16px;
      }

      .health {
        width: 118px;
      }

      .meters {
        grid-template-columns: repeat(3, 54px);
      }

      .stat {
        min-height: 48px;
        padding: 8px 7px 7px;
      }

      .label {
        font-size: 9px;
      }

      .value {
        margin-top: 6px;
        font-size: 17px;
      }

      .touch-pad,
      .touch-actions {
        display: flex;
      }

      .home-screen {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        align-content: start;
        gap: 12px;
        padding: calc(12px + env(safe-area-inset-top)) 10px calc(12px + env(safe-area-inset-bottom));
        overflow-y: auto;
      }

      .home-titlebar {
        grid-template-columns: 1fr;
        align-items: start;
        gap: 12px;
        padding: 16px;
      }

      .brand-lockup h1 {
        font-size: 34px;
      }

      .brand-lockup p {
        font-size: 13px;
      }

      .mission-pills {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        width: 100%;
      }

      .mission-pills span {
        min-width: 0;
        padding: 9px 8px;
      }

      .home-header {
        padding: 16px 15px 13px;
      }

      .home-header h2 {
        font-size: 23px;
      }

      .map-list,
      .talent-list {
        padding: 10px;
      }

      .map-button {
        grid-template-columns: 46px minmax(0, 1fr);
        min-height: 78px;
      }

      .organ-mark {
        width: 42px;
        height: 42px;
      }

      .map-status {
        grid-column: 2;
        text-align: left;
      }

      .map-threat {
        left: 68px;
      }

      .campaign-panel {
        padding: 10px;
      }

      .chapter-step {
        grid-template-columns: 30px minmax(0, 1fr);
      }

      .chapter-type {
        grid-column: 2;
        text-align: left;
      }

      .campaign-start {
        width: calc(100% - 20px);
        margin: 0 10px 10px;
      }

      .shop-overlay {
        top: calc(80px + env(safe-area-inset-top));
        max-height: calc(100vh - 112px - env(safe-area-inset-bottom));
      }

      .shop-choices {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <canvas id="game" aria-label="2D 战斗游戏"></canvas>
  <main class="home-screen" id="homeScreen" aria-label="主页面">
    <header class="home-titlebar">
      <div class="brand-lockup">
        <h1>荧孢战场</h1>

      </div>
      <div class="mission-pills" aria-label="操作提示">

        <h2>迷宫推进</h2>

    </section>
    <section class="home-column">
      <header class="home-header">
        <span class="home-kicker">荧孢档案</span>
        <h2>当前强化</h2>
        <p>技能不在主界面购买。走到每个区域第 5 章商店后，从三项技能中选择一种强化。</p>
      </header>
      <div class="talent-summary">
        <span>商店选择次数</span>

  </main>
  <div class="hud" aria-hidden="true">
    <section class="panel identity">
      <h1 id="zoneTitle">荧孢战场</h1>
      <div class="health"><div class="health-fill" id="healthFill"></div></div>
    </section>
    <section class="panel meters">
      <div class="stat">
        <span class="label">剩余</span>

      </div>
      <div class="stat">
        <span class="label">击破</span>

      </div>

  </div>

  <nav class="touch-pad" aria-hidden="true">
    <button class="pad-button" data-dir="up" type="button">上</button>
    <button class="pad-button" data-dir="left" type="button">左</button>
    <button class="pad-button" data-dir="right" type="button">右</button>
    <button class="pad-button" data-dir="down" type="button">下</button>
  </nav>
  <nav class="touch-actions" aria-hidden="true">
    <button class="action-button" data-action="dash" type="button">闪避</button>
    <button class="action-button" data-action="fire" type="button">射击</button>
  </nav>
  <button class="return-home" id="returnHome" type="button">回到主页面</button>
  <section class="shop-overlay is-hidden" id="shopOverlay" aria-label="商店技能选择">
    <h2>菌巢商店</h2>
    <p id="shopHint">选择一个技能强化。选择完成后，继续向右走到下一段。</p>
    <div class="shop-choices" id="shopChoices"></div>
  </section>

  <script>
    (() => {
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d", { alpha: false });
      const homeScreen = document.querySelector("#homeScreen");
      const campaignPanel = document.querySelector("#campaignPanel");
      const talentList = document.querySelector("#talentList");
      const talentPointsNode = document.querySelector("#talentPoints");
      const startRun = document.querySelector("#startRun");
      const returnHome = document.querySelector("#returnHome");
      const shopOverlay = document.querySelector("#shopOverlay");
      const shopChoices = document.querySelector("#shopChoices");
      const shopHint = document.querySelector("#shopHint");
      const zoneTitle = document.querySelector("#zoneTitle");
      const healthFill = document.querySelector("#healthFill");
      const waveNode = document.querySelector("#wave");
      const killsNode = document.querySelector("#kills");
      const dashNode = document.querySelector("#dash");

      const maps = [
        {
          id: "mouth",
          name: "口腔菌幕",
          note: "牙龈裂隙里的红色菌冠，适合先清。",

          player: { x: 480, y: 540 },
          background: ["#7e2f10", "#ffbc55", "#9b4b24", "#211011"],
          enemies: [
            [180, 260, false], [240, 560, false], [500, 710, false], [760, 330, false],
            [990, 520, true], [1240, 300, false], [1420, 680, false], [1690, 450, false],
            [1960, 720, true], [2220, 360, false], [2480, 610, false], [2760, 420, true],
          ],
        },
        {
          id: "lung",
          name: "肺泡风巢",
          note: "蓝色泡室之间气流更强，敌人更分散。",

          world: { width: 3500, height: 980 },
