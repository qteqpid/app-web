<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light">
  <title>Qteqpid 的更多宝藏作品</title>
  <style>
    :root {
      --paper: #fffdf8;
      --paper-deep: #f4efe3;
      --ink: #1f2933;
      --muted: #6b7280;
      --line: rgba(31, 41, 51, 0.12);
      --seal: #d9483b;
      --mint: #2f7d6d;
      --blue: #315f9c;
      --shadow: 0 16px 46px rgba(52, 45, 34, 0.11);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--paper-deep);
      color: var(--ink);
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
      background:
        linear-gradient(90deg, rgba(49, 95, 156, 0.06) 1px, transparent 1px),
        linear-gradient(0deg, rgba(47, 125, 109, 0.05) 1px, transparent 1px),
        var(--paper);
      background-size: 28px 28px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 24px 24px, rgba(217, 72, 59, 0.08) 0 1px, transparent 1.5px),
        linear-gradient(180deg, rgba(255, 253, 248, 0.25), rgba(244, 239, 227, 0.55));
      background-size: 18px 18px, auto;
    }

    a {
      color: inherit;
    }

    .page {
      position: relative;
      width: min(100%, 1120px);
      max-width: 100%;
      margin: 0 auto;
      padding: calc(18px + env(safe-area-inset-top)) 16px calc(32px + env(safe-area-inset-bottom));
      overflow-x: hidden;
    }

    .masthead {
      display: grid;
      gap: 10px;
      padding: 8px 0 16px;
      border-bottom: 1px solid var(--line);
    }

    .mark {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--seal);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .mark::before {
      content: "";
      width: 22px;
      height: 22px;
      border: 2px solid currentColor;
      border-radius: 6px;
      transform: rotate(-8deg);
      background: rgba(217, 72, 59, 0.07);
    }

    h1 {
      margin: 0;
      font-size: 1.7rem;
      line-height: 1.2;
      font-weight: 850;
      letter-spacing: 0;
    }

    .intro {
      margin: 0;
      max-width: 38rem;
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.65;
    }

    .summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 0 12px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .count {
      color: var(--ink);
      font-weight: 800;
    }

    .list {
      display: grid;
      gap: 9px;
      min-width: 0;
    }

    .work {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) auto;
      gap: 11px;
      align-items: center;
      padding: 10px 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.88) inset;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      width: 100%;
      min-width: 0;
    }

    .icon-wrap {
      width: 56px;
      height: 56px;
      border-radius: 13px;
      padding: 0;
      background: #f8f3e7;
      box-shadow: 0 8px 18px rgba(31, 41, 51, 0.14);
      overflow: hidden;
    }

    .icon {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .content {
      min-width: 0;
      max-width: 100%;
      display: grid;
      gap: 6px;
    }

    .name {
      margin: 0;
      min-width: 0;
      font-size: 0.98rem;
      line-height: 1.35;
      font-weight: 820;
      overflow-wrap: anywhere;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.42;
      overflow-wrap: anywhere;
    }

    .download {
      align-self: end;
      justify-self: end;
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 31px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--ink);
      color: #fffdf8;
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 800;
      box-shadow: 0 7px 16px rgba(31, 41, 51, 0.18);
    }

    .download:active {
      transform: translateY(1px);
    }

    .download:focus-visible {
      outline: 3px solid rgba(49, 95, 156, 0.28);
      outline-offset: 3px;
    }

    .footnote {
      margin: 20px 0 0;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: rgba(31, 41, 51, 0.55);
      font-size: 0.78rem;
      line-height: 1.6;
      text-align: center;
    }

    @media (min-width: 720px) {
      .page {
        padding: calc(30px + env(safe-area-inset-top)) 28px calc(44px + env(safe-area-inset-bottom));
      }

      .masthead {
        grid-template-columns: 1fr auto;
        align-items: end;
      }

      .mark {
        grid-column: 1 / -1;
      }

      h1 {
        font-size: 2.1rem;
      }

      .intro {
        text-align: right;
      }

      .list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .work {
        min-height: 126px;
        align-items: start;
        padding: 12px;
      }

      .content {
        height: 100%;
      }

      .download {
        align-self: end;
      }
    }

    @media (min-width: 1040px) {
      .page {
        padding-left: 34px;
        padding-right: 34px;
      }

      .list {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="masthead">
      <div class="mark" aria-hidden="true">QTEQPID COLLECTION</div>
      <h1>Qteqpid 的更多宝藏作品</h1>
      <p class="intro">这里收集了 Qteqpid 的小工具、学习应用和创意作品。点开任意作品即可前往 App Store 下载。</p>
    </header>

    <div class="summary" aria-live="polite">
      <span><span class="count" id="appCount">0</span> 款作品</span>
      <span>纯静态网页</span>
    </div>

    <section class="list" id="appList" aria-label="Qteqpid 应用列表"></section>

    <noscript>
      <p class="footnote">当前浏览器未启用 JavaScript，作品列表无法渲染。</p>
    </noscript>
  </main>

  <script>
    const apps = [
      {
        name: "海龟汤来了",
        tagline: "风靡全球推理游戏",
        appleId: "6749227316",
        icon: "mini_icons/app_logo_moon_mini.jpg"
      },
      {
        name: "ins课程表",
        tagline: "超好用好看课程表",
        appleId: "6748935753",
        icon: "mini_icons/app_logo_class_mini.jpg"
      },
      {
        name: "晚安电台",
        tagline: "聆听世界的声音",
        appleId: "6757656997",
        icon: "mini_icons/app_logo_radio_mini.png"
      },
      {
        name: "青灯拾卷",
        tagline: "做有态度的读书人",
        appleId: "6779840110",
        icon: "mini_icons/app_logo_reader_mini.jpg"
      },
      {
        name: "贝塔英语",
        tagline: "背单词很轻松",
        appleId: "6748849691",
        icon: "mini_icons/app_logo_english_mini.jpg"
      },
      {
        name: "灵光一现",
        tagline: "帮你随时记录想法",
        appleId: "6748610782",
        icon: "mini_icons/app_logo_idea_mini.png"
      },
      {
        name: "超级错题本",
        tagline: "拍照整理作业错题",
        appleId: "6753838149",
        icon: "mini_icons/app_logo_wrong_mini.jpg"
      },
      {
        name: "聚会卡牌",
        tagline: "团建聚会破冰游戏",
        appleId: "6752017904",
        icon: "mini_icons/app_logo_fun_mini.jpg"
      },
      {
        name: "景深VR",
        tagline: "3D视频制作神器",
        appleId: "6783583346",
        icon: "mini_icons/app_logo_vr_mini.jpg"
      },
      {
        name: "小爱口算",
        tagline: "小学生口算练习神器",
        appleId: "6748607355",
        icon: "mini_icons/app_logo_math_mini.jpg"
      },
      {
        name: "汉字卡片",
        tagline: "幼儿识字好帮手",
        appleId: "6753268205",
        icon: "mini_icons/app_logo_chinese_mini.png"
      },
      {
        name: "密码柜",
        tagline: "生活密码全记住",
        appleId: "6748747342",
        icon: "mini_icons/app_logo_passbox_mini.png"
      },
      {
        name: "相册清理助手",
        tagline: "相似照片与大视频清理",
        appleId: "6748892725",
        icon: "mini_icons/app_logo_cleaner_mini.png"
      },
      {
        name: "iShots",
        tagline: "App 截图制作工具",
        appleId: "6754618226",
        icon: "mini_icons/app_logo_ishots_mini.png"
      }
    ];

    const appList = document.querySelector("#appList");
    const appCount = document.querySelector("#appCount");

    function appStoreUrl(appleId) {
      return `https://apps.apple.com/app/id${appleId}`;
    }

    function renderApps(items) {
      appCount.textContent = String(items.length);
      appList.innerHTML = items.map((app) => {
        const storeUrl = appStoreUrl(app.appleId);
        return `
          <article class="work">
            <div class="icon-wrap">
              <img class="icon" src="${app.icon}" alt="${app.name} 图标" loading="lazy">
            </div>
            <div class="content">
              <h2 class="name">${app.name}</h2>
              ${app.tagline ? `<p class="desc">${app.tagline}</p>` : ""}
            </div>
            <a class="download" href="${storeUrl}" aria-label="在 App Store 下载 ${app.name}">下载</a>
          </article>
        `;
      }).join("");
    }

    renderApps(apps);
  </script>
</body>
</html>
