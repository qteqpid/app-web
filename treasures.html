<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light">
  <title>Qteqpid 的更多宝藏作品</title>
  <style>
    :root {
      --paper: #fffdf8;
      --paper-deep: #f4efe3;
      --ink: #1f2933;
      --muted: #6b7280;
      --line: rgba(31, 41, 51, 0.12);
      --seal: #d9483b;
      --mint: #2f7d6d;
      --blue: #315f9c;
      --shadow: 0 16px 46px rgba(52, 45, 34, 0.11);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--paper-deep);
      color: var(--ink);
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
      background:
        linear-gradient(90deg, rgba(49, 95, 156, 0.06) 1px, transparent 1px),
        linear-gradient(0deg, rgba(47, 125, 109, 0.05) 1px, transparent 1px),
        var(--paper);
      background-size: 28px 28px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 24px 24px, rgba(217, 72, 59, 0.08) 0 1px, transparent 1.5px),
        linear-gradient(180deg, rgba(255, 253, 248, 0.25), rgba(244, 239, 227, 0.55));
      background-size: 18px 18px, auto;
    }

    a {
      color: inherit;
    }

    .page {
      position: relative;
      width: min(100%, 1120px);
      margin: 0 auto;
      padding: calc(18px + env(safe-area-inset-top)) 16px calc(32px + env(safe-area-inset-bottom));
    }

    .masthead {
      display: grid;
      gap: 10px;
      padding: 8px 0 16px;
      border-bottom: 1px solid var(--line);
    }

    .mark {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--seal);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .mark::before {
      content: "";
      width: 22px;
      height: 22px;
      border: 2px solid currentColor;
      border-radius: 6px;
      transform: rotate(-8deg);
      background: rgba(217, 72, 59, 0.07);
    }

    h1 {
      margin: 0;
      font-size: 1.7rem;
      line-height: 1.2;
      font-weight: 850;
      letter-spacing: 0;
    }

    .intro {
      margin: 0;
      max-width: 38rem;
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.65;
    }

    .summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 0 12px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .count {
      color: var(--ink);
      font-weight: 800;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .work {
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr);
      gap: 13px;
      align-items: center;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.88) inset;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .icon-wrap {
      width: 64px;
      height: 64px;
      border-radius: 15px;
      padding: 0;
      background: #f8f3e7;
      box-shadow: 0 8px 18px rgba(31, 41, 51, 0.14);
      overflow: hidden;
    }

    .icon {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .content {
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .name {
      margin: 0;
      min-width: 0;
      font-size: 1rem;
      line-height: 1.35;
      font-weight: 820;
      overflow-wrap: anywhere;
    }

    .tag {
      flex: 0 0 auto;
      border: 1px solid rgba(47, 125, 109, 0.24);
      border-radius: 999px;
      padding: 3px 7px;
      color: var(--mint);
      background: rgba(47, 125, 109, 0.07);
      font-size: 0.72rem;
      font-weight: 760;
      white-space: nowrap;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .meta {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .id {
      width: 100%;
      min-width: 0;
      color: rgba(31, 41, 51, 0.48);
      font-size: 0.74rem;
      overflow-wrap: anywhere;
    }

    .download {
      align-self: flex-start;
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 13px;
      border-radius: 999px;
      background: var(--ink);
      color: #fffdf8;
      text-decoration: none;
      font-size: 0.86rem;
      font-weight: 800;
      box-shadow: 0 7px 16px rgba(31, 41, 51, 0.18);
    }

    .download:active {
      transform: translateY(1px);
    }

    .download:focus-visible {
      outline: 3px solid rgba(49, 95, 156, 0.28);
      outline-offset: 3px;
    }

    .footnote {
      margin: 20px 0 0;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: rgba(31, 41, 51, 0.55);
      font-size: 0.78rem;
      line-height: 1.6;
      text-align: center;
    }

    @media (min-width: 720px) {
      .page {
        padding: calc(30px + env(safe-area-inset-top)) 28px calc(44px + env(safe-area-inset-bottom));
      }

      .masthead {
        grid-template-columns: 1fr auto;
        align-items: end;
      }

      .mark {
        grid-column: 1 / -1;
      }

      h1 {
        font-size: 2.1rem;
      }

      .intro {
        text-align: right;
      }

      .list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .work {
        min-height: 174px;
        align-items: start;
        padding: 16px;
      }

      .content {
        height: 100%;
      }

      .meta {
        flex-direction: row;
        align-self: end;
      }

      .id {
        width: auto;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .download {
        align-self: auto;
      }
    }

    @media (min-width: 1040px) {
      .page {
        padding-left: 34px;
        padding-right: 34px;
      }

      .list {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="masthead">
      <div class="mark" aria-hidden="true">QTEQPID COLLECTION</div>
      <h1>Qteqpid 的更多宝藏作品</h1>
      <p class="intro">这里收集了 Qteqpid 的小工具、学习应用和创意作品。点开任意作品即可前往 App Store 下载。</p>
    </header>

    <div class="summary" aria-live="polite">
      <span><span class="count" id="appCount">0</span> 款作品</span>
      <span>纯静态网页</span>
    </div>

    <section class="list" id="appList" aria-label="Qteqpid 应用列表"></section>

    <noscript>
      <p class="footnote">当前浏览器未启用 JavaScript，作品列表无法渲染。</p>
    </noscript>

    <p class="footnote">作品列表由页面内的 JavaScript 数组维护，新增作品只需要补一条数据。</p>
  </main>

  <script>
    const apps = [
      {
        name: "海龟汤来了",
        tagline: "风靡全球推理游戏",
        description: "适合朋友聚会、通勤碎片时间和脑洞训练的推理问答游戏，一起从只言片语里拆出真相。",
        appleId: "6749227316",
        icon: "mini_icons/app_logo_wrong_mini.jpg",
        category: "推理"
      },
      {
        name: "课程表来了",
        tagline: "学生家长教师必备",
        description: "把每天的课程、上课时间和提醒整理得清清楚楚，适合学生、家长和老师随手查看。",
        appleId: "6748935753",
        icon: "mini_icons/app_logo_class_mini.jpg",
        category: "学习"
      },
      {
        name: "晚安电台",
        tagline: "聆听世界的声音",
        description: "收听来自世界各地的电台声音，让睡前、阅读和独处的时间多一点安静陪伴。",
        appleId: "6757656997",
        icon: "mini_icons/app_logo_radio_mini.png",
        category: "声音"
      },
      {
        name: "青灯拾卷",
        tagline: "做有态度的读书人",
        description: "为认真读书的人准备的阅读记录与书摘空间，把读过的句子和想法慢慢留下来。",
        appleId: "6779840110",
        icon: "mini_icons/app_logo_reader_mini.jpg",
        category: "阅读"
      },
      {
        name: "背单词来了",
        tagline: "学英语很简单",
        description: "面向日常英语积累的单词学习工具，用更轻的节奏帮助你坚持记忆和复习。",
        appleId: "6748849691",
        icon: "mini_icons/app_logo_english_mini.jpg",
        category: "英语"
      },
      {
        name: "灵光一现",
        tagline: "帮你随时记录想法",
        description: "灵感、待办、片段和突然冒出来的小念头，都可以先快速收进一个安静的地方。",
        appleId: "6748610782",
        icon: "mini_icons/app_logo_idea_mini.png",
        category: "记录"
      },
      {
        name: "聚会卡牌",
        tagline: "团建聚会破冰游戏",
        description: "为聚会、团建和破冰准备的卡牌问题库，让现场更容易热起来，也更容易聊下去。",
        appleId: "6752017904",
        icon: "mini_icons/app_logo_fun_mini.jpg",
        category: "聚会"
      },
      {
        name: "景深VR",
        tagline: "3D视频制作神器",
        description: "面向 3D 与景深视频创作的实用工具，帮助你把素材处理成更有沉浸感的视觉作品。",
        appleId: "6783583346",
        icon: "mini_icons/app_logo_vr_mini.jpg",
        category: "视频"
      },
      {
        name: "小学生口算练习",
        tagline: "每天练一点",
        description: "为小学生设计的口算训练工具，适合日常练习、家长陪练和基础计算能力巩固。",
        appleId: "6748607355",
        icon: "mini_icons/app_logo_math_mini.jpg",
        category: "数学"
      },
      {
        name: "汉字卡片",
        tagline: "幼儿识字好帮手",
        description: "用简单清楚的汉字卡片帮助孩子识字启蒙，让亲子学习更轻松、更有节奏。",
        appleId: "6753268205",
        icon: "mini_icons/app_logo_chinese_mini.png",
        category: "识字"
      },
      {
        name: "密码柜",
        tagline: "生活密码全记住",
        description: "把生活里零散的重要密码和账号信息集中保存，减少反复翻找和遗忘的麻烦。",
        appleId: "6748747342",
        icon: "mini_icons/app_logo_passbox_mini.png",
        category: "工具"
      },
      {
        name: "相册清理助手",
        tagline: "轻松整理照片",
        description: "帮助你清理相册里的重复、相似和不再需要的照片，让手机空间重新变得清爽。",
        appleId: "6748892725",
        icon: "mini_icons/app_logo_cleaner_mini.png",
        category: "相册"
      },
      {
        name: "iShots",
        tagline: "截图整理与展示",
        description: "为截图收集、整理和展示准备的小工具，让重要截图不再淹没在相册里。",
        appleId: "6754618226",
        icon: "mini_icons/app_logo_ishots_mini.png",
        category: "截图"
      }
    ];

    const appList = document.querySelector("#appList");
    const appCount = document.querySelector("#appCount");

    function appStoreUrl(appleId) {
      return `https://apps.apple.com/app/id${appleId}`;
    }

    function renderApps(items) {
      appCount.textContent = String(items.length);
      appList.innerHTML = items.map((app) => {
        const storeUrl = appStoreUrl(app.appleId);
        return `
          <article class="work">
            <div class="icon-wrap">
              <img class="icon" src="${app.icon}" alt="${app.name} 图标" loading="lazy">
            </div>
            <div class="content">
              <div class="title-row">
                <h2 class="name">${app.name}</h2>
                <span class="tag">${app.category}</span>
              </div>
              <p class="desc">${app.tagline}。${app.description}</p>
              <div class="meta">
                <span class="id">App Store ID ${app.appleId}</span>
                <a class="download" href="${storeUrl}" aria-label="在 App Store 下载 ${app.name}">下载</a>
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    renderApps(apps);
  </script>
</body>
</html>
