<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light">
  <title>Qteqpid 的更多宝藏 App</title>
  <style>
    :root {
      --paper: #fffdf8;
      --paper-deep: #f4efe3;
      --ink: #1f2933;
      --muted: #6b7280;
      --line: rgba(31, 41, 51, 0.12);
      --seal: #d9483b;
      --mint: #2f7d6d;
      --blue: #315f9c;
      --shadow: 0 16px 46px rgba(52, 45, 34, 0.11);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--paper-deep);
      color: var(--ink);
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
      background:
        linear-gradient(90deg, rgba(49, 95, 156, 0.06) 1px, transparent 1px),
        linear-gradient(0deg, rgba(47, 125, 109, 0.05) 1px, transparent 1px),
        var(--paper);
      background-size: 28px 28px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 24px 24px, rgba(217, 72, 59, 0.08) 0 1px, transparent 1.5px),
        linear-gradient(180deg, rgba(255, 253, 248, 0.25), rgba(244, 239, 227, 0.55));
      background-size: 18px 18px, auto;
    }

    a {
      color: inherit;
    }

    .page {
      position: relative;
      width: min(100%, 1120px);
      max-width: 100%;
      margin: 0 auto;
      padding: calc(18px + env(safe-area-inset-top)) 16px calc(32px + env(safe-area-inset-bottom));
      overflow-x: hidden;
    }

    .masthead {
      display: grid;
      gap: 10px;
      padding: 8px 0 16px;
      border-bottom: 1px solid var(--line);
    }

    .mark {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--seal);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .mark::before {
      content: "";
      width: 22px;
      height: 22px;
      border: 2px solid currentColor;
      border-radius: 6px;
      transform: rotate(-8deg);
      background: rgba(217, 72, 59, 0.07);
    }

    h1 {
      margin: 0;
      font-size: 1.7rem;
      line-height: 1.2;
      font-weight: 850;
      letter-spacing: 0;
    }

    .intro {
      margin: 0;
      max-width: 38rem;
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.65;
    }

    .summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 0 12px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .count {
      color: var(--ink);
      font-weight: 800;
    }

    .collection {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .section-heading {
      display: grid;
      gap: 5px;
      padding-top: 2px;
    }

    h2 {
      margin: 0;
      color: var(--ink);
      font-size: 1.06rem;
      line-height: 1.25;
      font-weight: 850;
      letter-spacing: 0;
    }

    .section-heading p {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.55;
    }

    .list {
      display: grid;
      gap: 9px;
      min-width: 0;
    }

    .work {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) auto;
      gap: 11px;
      align-items: center;
      padding: 10px 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.88) inset;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      width: 100%;
      min-width: 0;
    }

    .icon-wrap {
      width: 56px;
      height: 56px;
      border-radius: 13px;
      padding: 0;
      background: #f8f3e7;
      box-shadow: 0 8px 18px rgba(31, 41, 51, 0.14);
      overflow: hidden;
    }

    .icon {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .content {
      min-width: 0;
      max-width: 100%;
      display: grid;
      gap: 6px;
    }

    .name {
      margin: 0;
      min-width: 0;
      font-size: 0.98rem;
      line-height: 1.35;
      font-weight: 820;
      overflow-wrap: anywhere;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.42;
      overflow-wrap: anywhere;
    }

    .download {
      align-self: start;
      justify-self: end;
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 31px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--ink);
      color: #fffdf8;
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 800;
      box-shadow: 0 7px 16px rgba(31, 41, 51, 0.18);
    }

    .download:active {
      transform: translateY(1px);
    }

    .download:focus-visible {
      outline: 3px solid rgba(49, 95, 156, 0.28);
      outline-offset: 3px;
    }

    .footnote {
      margin: 20px 0 0;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: rgba(31, 41, 51, 0.55);
      font-size: 0.78rem;
      line-height: 1.6;
      text-align: center;
    }

    @media (min-width: 720px) {
      .page {
        padding: calc(30px + env(safe-area-inset-top)) 28px calc(44px + env(safe-area-inset-bottom));
      }

      .masthead {
        grid-template-columns: 1fr auto;
        align-items: end;
      }

      .mark {
        grid-column: 1 / -1;
      }

      h1 {
        font-size: 2.1rem;
      }

      .intro {
        text-align: right;
      }

      .list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .work {
        min-height: 126px;
        align-items: start;
        padding: 12px;
      }

      .content {
        height: 100%;
      }

      .download {
        align-self: start;
      }
    }

    @media (min-width: 1040px) {
      .page {
        padding-left: 34px;
        padding-right: 34px;
      }

      .list {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="masthead">
      <div class="mark" aria-hidden="true">QTEQPID COLLECTION</div>
      <h1 id="pageTitle">Qteqpid 的更多宝藏 App</h1>
      <p class="intro" id="pageIntro">这里收集了 Qteqpid 的 15 款 iPhone App 和 Mac 工具。点开任意条目即可前往详情页或下载页面。</p>
    </header>

    <div class="summary" aria-live="polite">
      <span><span class="count" id="appCount">0</span> <span id="countLabel">款 iPhone App</span></span>
    </div>

    <section class="collection" aria-labelledby="iphoneTitle">
      <div class="section-heading">
        <h2 id="iphoneTitle">iPhone App</h2>
        <p id="iphoneIntro">轻量工具、学习应用和创意小作品，均可从 App Store 下载。</p>
      </div>
      <div class="list" id="appList" aria-label="Qteqpid iPhone App 列表"></div>
    </section>

    <section class="collection" aria-labelledby="macTitle">
      <div class="section-heading">
        <h2 id="macTitle">Mac App</h2>
        <p id="macIntro">面向 macOS 的桌面与效率工具。</p>
      </div>
      <div class="list" id="macAppList" aria-label="Qteqpid Mac App 列表"></div>
    </section>

    <noscript>
      <p class="footnote">当前浏览器未启用 JavaScript，App 列表无法渲染。</p>
    </noscript>
  </main>

  <script>
    const copy = {
      zh: {

        pageTitle: "Qteqpid 的更多宝藏 App",
        pageIntro: "这里收集了 Qteqpid 的 15 款 iPhone App 和 Mac 工具。点开任意条目即可前往详情页或下载页面。",
        countLabel: "款 iPhone App",
        download: "下载",
        open: "查看",
        iconAlt: "图标",
        iphoneTitle: "iPhone App",
        iphoneIntro: "轻量工具、学习应用和创意小作品，均可从 App Store 下载。",
        macTitle: "Mac App",
        macIntro: "面向 macOS 的桌面与效率工具。",
        downloadAria: "在 App Store 下载",
        openAria: "查看"
      },
      en: {
        htmlLang: "en",
        pageTitle: "More Qteqpid Apps",
        pageIntro: "A compact collection of 15 Qteqpid iPhone apps and Mac utilities. Open any item for details or downloads.",
        countLabel: "iPhone apps",
        download: "Get",
        open: "Open",
        iconAlt: "icon",
        iphoneTitle: "iPhone Apps",
        iphoneIntro: "Lightweight utilities, learning apps, and creative tools available on the App Store.",
        macTitle: "Mac Apps",
        macIntro: "Desktop and productivity tools for macOS.",
        downloadAria: "Download on the App Store",
        openAria: "Open"
      }
    };

    const apps = [
      {
        name: { zh: "海龟汤来了", en: "Situation Puzzle" },
        tagline: { zh: "风靡全球推理游戏", en: "A popular lateral-thinking mystery game" },
        appleId: "6749227316",
        icon: "mini_icons/app_logo_moon_mini.jpg"
      },
      {
        name: { zh: "ins课程表", en: "Class Schedule" },
        tagline: { zh: "超好用好看课程表", en: "A beautiful, practical class schedule" },
        appleId: "6748935753",
        icon: "mini_icons/app_logo_class_mini.jpg"
      },
      {
        name: { zh: "超级错题本", en: "Mistake Notebook" },
        tagline: { zh: "拍照整理作业错题", en: "Scan and organize homework mistakes" },
        appleId: "6753838149",
        icon: "mini_icons/app_logo_wrong_mini.jpg"
      },
      {
        name: { zh: "灵光一现", en: "Spark" },
        tagline: { zh: "帮你随时记录想法", en: "Capture ideas whenever they appear" },
        appleId: "6748610782",
        icon: "mini_icons/app_logo_idea_mini.png"
      },
      {
        name: { zh: "聚会卡牌", en: "Party Cards" },
        tagline: { zh: "团建聚会破冰游戏", en: "Icebreaker cards for parties and teams" },
        appleId: "6752017904",
        icon: "mini_icons/app_logo_fun_mini.jpg"
      },
      {
        name: { zh: "晚安电台", en: "Goodnight Radio" },
        tagline: { zh: "聆听世界的声音", en: "Listen to voices from around the world" },
        appleId: "6757656997",
        icon: "mini_icons/app_logo_radio_mini.png"
      },
      {
        name: { zh: "青灯拾卷", en: "Kinder Reader" },
        tagline: { zh: "做有态度的读书人", en: "For readers with a point of view" },
        appleId: "6779840110",

      },
      {
        name: { zh: "贝塔英语", en: "Beta English" },
        tagline: { zh: "背单词很轻松", en: "Make vocabulary practice easier" },

        icon: "mini_icons/app_logo_english_mini.jpg"
      },
      {
        name: { zh: "LumiAI", en: "LumiAI" },
        tagline: { zh: "每日 AI 资讯精选", en: "Curated daily AI news" },
        appleId: "6786902091",
        icon: "mini_icons/app_logo_lumiai_mini.jpg"
      },
      {
        name: { zh: "景深VR", en: "DepthVR" },
        tagline: { zh: "3D视频制作神器", en: "A handy tool for creating 3D videos" },
        appleId: "6783583346",

      },
      {
        name: { zh: "小爱口算", en: "Math Practice" },
        tagline: { zh: "小学生口算练习神器", en: "Mental math practice for primary students" },
        appleId: "6748607355",
        icon: "mini_icons/app_logo_math_mini.jpg"
      },
      {
        name: { zh: "汉字卡片", en: "Chinese Character" },
        tagline: { zh: "幼儿识字好帮手", en: "A friendly helper for early character learning" },
        appleId: "6753268205",
        icon: "mini_icons/app_logo_chinese_mini.png"
      },
      {
        name: { zh: "密码柜", en: "Passbox" },
        tagline: { zh: "生活密码全记住", en: "Keep everyday passwords safe" },
        appleId: "6748747342",
        icon: "mini_icons/app_logo_passbox_mini.jpg"
      },
      {
        name: { zh: "相册清理助手", en: "Photo Cleaner" },
        tagline: { zh: "相似照片与大视频清理", en: "Clean up similar photos and large videos" },
        appleId: "6748892725",
        icon: "mini_icons/app_logo_cleaner_mini.jpg"
      },
      {
        name: { zh: "iShots", en: "iShots" },
        tagline: { zh: "App上架预览截图制作工具", en: "App previews and screenshots maker" },
        appleId: "6754618226",
        icon: "mini_icons/app_logo_ishots_mini.png"
      }
    ];

    const macApps = [
      {
        name: { zh: "MacDesktopBuddy", en: "MacDesktopBuddy" },
        tagline: {
          zh: "macOS 桌面待办与提醒小Q",
          en: "A tiny macOS desktop todo companion"
        },
        href: "mac-desktop-buddy/",
        icon: "mac-desktop-buddy/assets/mac-desktop-buddy-icon-mini.png"
      },
      {
        name: { zh: "Browser Time Tracker", en: "Browser Time Tracker" },
        tagline: {
          zh: "macOS 本地网页使用时间统计",
          en: "Local website time tracking for macOS"
        },
        href: "browser-time-tracker/",
        icon: "browser-time-tracker/assets/browser-time-tracker-logo-mini.jpg"
      }
    ];

    const appList = document.querySelector("#appList");
    const macAppList = document.querySelector("#macAppList");
    const appCount = document.querySelector("#appCount");
    const pageTitle = document.querySelector("#pageTitle");
    const pageIntro = document.querySelector("#pageIntro");
    const countLabel = document.querySelector("#countLabel");
    const iphoneTitle = document.querySelector("#iphoneTitle");
    const iphoneIntro = document.querySelector("#iphoneIntro");
    const macTitle = document.querySelector("#macTitle");
    const macIntro = document.querySelector("#macIntro");

    function appStoreUrl(appleId) {
      return `https://apps.apple.com/app/id${appleId}`;
    }

    function normalizeLanguage(value) {
      const language = String(value || "").trim().toLowerCase();
      if (language.startsWith("en")) return "en";
      if (language.startsWith("zh")) return "zh";
      return "";
    }

    function currentLanguage() {
      const params = new URLSearchParams(window.location.search);
      return normalizeLanguage(params.get("lang")) || "zh";
    }

    function localized(value, lang) {
      if (typeof value === "string") return value;
      return value[lang] || value.zh || value.en || "";
    }

    function escapeHTML(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    const ICON_PLACEHOLDER = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==";
    const IMAGE_CACHE_NAME = "treasures-image-cache-v1";
    const IMAGE_CACHE_TTL_MS = 365 * 24 * 60 * 60 * 1000;
    const IMAGE_CACHE_TIME_HEADER = "x-treasures-cache-time";
    const imageObjectUrls = new Set();

    function canCacheImage(src) {
      if (!("caches" in window) || !("Response" in window) || typeof URL.createObjectURL !== "function") return false;
      const protocol = new URL(src, window.location.href).protocol;
      return protocol === "http:" || protocol === "https:";
    }

    async function responseToObjectUrl(response) {
      const objectUrl = URL.createObjectURL(await response.blob());
      imageObjectUrls.add(objectUrl);
      return objectUrl;
    }

    async function cachedImageUrl(src) {
      if (!canCacheImage(src)) return src;

      const now = Date.now();
      const url = new URL(src, window.location.href).href;
      const request = new Request(url);
      const cache = await caches.open(IMAGE_CACHE_NAME);
      const cached = await cache.match(request);

      if (cached) {
        const cachedAt = Number(cached.headers.get(IMAGE_CACHE_TIME_HEADER)) || 0;
        if (now - cachedAt < IMAGE_CACHE_TTL_MS) return responseToObjectUrl(cached);
        await cache.delete(request);
      }

      const response = await fetch(url, { cache: "reload" });
      if (!response.ok) throw new Error(`Image request failed: ${response.status}`);

      const headers = new Headers(response.headers);
      headers.set(IMAGE_CACHE_TIME_HEADER, String(now));

      const cachedResponse = new Response(await response.blob(), {
        status: response.status,
        statusText: response.statusText,
        headers
      });

      await cache.put(request, cachedResponse.clone());
      return responseToObjectUrl(cachedResponse);
    }

    function hydrateCachedImages(container) {
      container.querySelectorAll("img[data-icon-src]").forEach((image) => {
        const src = image.dataset.iconSrc;
        cachedImageUrl(src)
          .then((url) => {
            image.src = url;
          })
          .catch(() => {
            image.src = src;
          });
      });
    }

    window.addEventListener("pagehide", () => {
      imageObjectUrls.forEach((url) => URL.revokeObjectURL(url));
      imageObjectUrls.clear();
    });

    function renderStaticText(lang) {
      const text = copy[lang];
      document.documentElement.lang = text.htmlLang;
      document.title = text.pageTitle;
      pageTitle.textContent = text.pageTitle;
      pageIntro.textContent = text.pageIntro;
      countLabel.textContent = text.countLabel;
      iphoneTitle.textContent = text.iphoneTitle;
      iphoneIntro.textContent = text.iphoneIntro;
      macTitle.textContent = text.macTitle;
      macIntro.textContent = text.macIntro;
    }

    function renderApps(container, items, lang, options = {}) {
      const text = copy[lang];
      const action = options.action || "download";
      const label = action === "open" ? text.open : text.download;
      const ariaPrefix = action === "open" ? text.openAria : text.downloadAria;

      container.innerHTML = items.map((app) => {
        const itemUrl = app.href || appStoreUrl(app.appleId);
        const name = localized(app.name, lang);
        const tagline = localized(app.tagline, lang);
        return `
          <article class="work">
            <div class="icon-wrap">
              <img class="icon" src="${ICON_PLACEHOLDER}" data-icon-src="${escapeHTML(app.icon)}" alt="${escapeHTML(`${name} ${text.iconAlt}`)}" loading="lazy" decoding="async">
            </div>
            <div class="content">
              <h2 class="name">${escapeHTML(name)}</h2>
              ${tagline ? `<p class="desc">${escapeHTML(tagline)}</p>` : ""}
            </div>
            <a class="download" href="${itemUrl}" aria-label="${escapeHTML(`${ariaPrefix} ${name}`)}">${escapeHTML(label)}</a>
          </article>
        `;
      }).join("");
    }

    const lang = currentLanguage();
    renderStaticText(lang);
    appCount.textContent = String(apps.length);
    renderApps(appList, apps, lang);
    renderApps(macAppList, macApps, lang, { action: "open" });
    hydrateCachedImages(appList);
    hydrateCachedImages(macAppList);
  </script>
</body>
</html>
